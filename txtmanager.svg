<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6fd4"/>
      <stop offset="100%" style="stop-color:#0a3d8f"/>
    </linearGradient>
  </defs>

  <!-- Bakgrunn -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>

  <!-- Dokument -->
  <rect x="220" y="150" width="460" height="530" rx="40" ry="40" fill="white" opacity="0.95"/>

  <!-- abc -->
  <text x="512" y="230"
        font-family="SF Pro Rounded, Helvetica Neue, Arial"
        font-size="72"
        font-weight="800"
        fill="#1a6fd4"
        text-anchor="middle">abc</text>

  <!-- Linjer -->
  <rect x="280" y="260" width="200" height="28" rx="14" fill="#1a6fd4" opacity="0.8"/>
  <rect x="280" y="315" width="340" height="22" rx="11" fill="#ccc"/>
  <rect x="280" y="358" width="300" height="22" rx="11" fill="#ccc"/>
  <rect x="280" y="401" width="320" height="22" rx="11" fill="#ccc"/>
  <rect x="280" y="444" width="260" height="22" rx="11" fill="#ccc"/>

  <!-- Pil -->
  <g transform="translate(512, 555)">
    <rect x="-120" y="-22" width="180" height="28" rx="14" fill="#1a6fd4"/>
    <polygon points="70,-28 130,0 70,28" fill="#1a6fd4"/>
  </g>

  <!-- Ny tekst under pilen -->
  <rect x="280" y="600" width="340" height="22" rx="11" fill="#1a6fd4" opacity="0.5"/>

  <!-- TXTMANAGER tekst nederst -->
  <text x="512" y="950"
        font-family="SF Pro Rounded, Helvetica Neue, Arial"
        font-size="72"
        font-weight="800"
        fill="white"
        opacity="0.9"
        text-anchor="middle">TXTMANAGER</text>
</svg>
